name: "Terraform Multi-Env CI/CD"

on:
  push:
    branches: [main, test, dev]

  pull_request:
    branches: [main, test, dev]


env:
  TF_LOG: INFO
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  terraform-plan:
    runs-on: ubuntu-latest

    outputs:
      tf_workspace: ${{ steps.env-vars.outputs.tf_workspace }}

    defaults:
      run:
        shell: bash
        working-directory: ./code/   # ✅ IMPORTANT

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.3

      - run: terraform init
      - run: terraform fmt -check
      - run: terraform validate

      - name: Set Environment
        id: env-vars
        run: |
          BRANCH="${{ github.ref_name }}"
          if [[ "$BRANCH" == "main" ]]; then
            echo "WORKSPACE_NAME=prod" >> $GITHUB_ENV
            echo "tf_workspace=prod" >> $GITHUB_OUTPUT
            echo "TF_VAR_FILE=prod.tfvars" >> $GITHUB_ENV
          elif [[ "$BRANCH" == "test" ]]; then
            echo "WORKSPACE_NAME=test" >> $GITHUB_ENV
            echo "tf_workspace=test" >> $GITHUB_OUTPUT
            echo "TF_VAR_FILE=test.tfvars" >> $GITHUB_ENV
          else
            echo "WORKSPACE_NAME=dev" >> $GITHUB_ENV
            echo "tf_workspace=dev" >> $GITHUB_OUTPUT
            echo "TF_VAR_FILE=dev.tfvars" >> $GITHUB_ENV
          fi

      - run: terraform workspace select $WORKSPACE_NAME || terraform workspace new $WORKSPACE_NAME

      - name: Terraform Plan
        run: terraform plan -var-file=$TF_VAR_FILE -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ env.WORKSPACE_NAME }}
          path: ./code/tfplan   # ✅ YOUR REQUIRED PATH

  terraform-apply:
    needs: terraform-plan
    if: github.event_name == 'push' && needs.terraform-plan.result == 'success'
    runs-on: ubuntu-latest

    environment: ${{ needs.terraform-plan.outputs.tf_workspace }}

    defaults:
      run:
        shell: bash
        working-directory: ./code/   # ✅ IMPORTANT

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.3

      - run: terraform init

      - name: Set Environment
        run: |
          BRANCH="${{ github.ref_name }}"
          if [[ "$BRANCH" == "main" ]]; then
            echo "WORKSPACE_NAME=prod" >> $GITHUB_ENV
            echo "TF_VAR_FILE=prod.tfvars" >> $GITHUB_ENV
          elif [[ "$BRANCH" == "test" ]]; then
            echo "WORKSPACE_NAME=test" >> $GITHUB_ENV
            echo "TF_VAR_FILE=test.tfvars" >> $GITHUB_ENV
          else
            echo "WORKSPACE_NAME=dev" >> $GITHUB_ENV
            echo "TF_VAR_FILE=dev.tfvars" >> $GITHUB_ENV
          fi

      - run: terraform workspace select $WORKSPACE_NAME || terraform workspace new $WORKSPACE_NAME

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ env.WORKSPACE_NAME }}
          path: ./code/   # ✅ matches upload

      - run: terraform apply -auto-approve tfplan
